<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบฟอร์มกรอกข้อมูลสถานที่ผลิตน้ำบริโภค/น้ำแข็ง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0A4A6E;
    --primary-light: #1a6fa0;
    --accent: #00C9A7;
    --accent2: #F4A020;
    --bg: #f0f5f9;
    --card: #ffffff;
    --text: #1a2e3b;
    --text-light: #5a7a8a;
    --border: #d0e4ef;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --row-hover: #e8f4fd;
    --tag-bg: #e0f2fe;
    --tag-text: #0369a1;
    --shadow: 0 4px 24px rgba(10,74,110,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(10,74,110,0.25);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-icon {
    width: 46px; height: 46px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
    line-height: 1.3;
  }
  .header-text p {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 2px;
  }
  .amphoe-badge {
    margin-left: auto;
    background: var(--accent);
    color: #003d2e;
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* Main */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 14px 20px;
    flex: 1;
    min-width: 140px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-card.total { border-left-color: var(--primary); }
  .stat-card.filled { border-left-color: var(--success); }
  .stat-card.pending { border-left-color: var(--warning); }
  .stat-label { font-size: 12px; color: var(--text-light); font-weight: 500; }
  .stat-val { font-family: 'Chakra Petch', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); }
  .stat-card.total .stat-val { color: var(--primary); }
  .stat-card.filled .stat-val { color: var(--success); }
  .stat-card.pending .stat-val { color: var(--warning); }

  /* Progress */
  .progress-wrap {
    background: white;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .progress-bar {
    height: 10px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, var(--primary-light) 100%);
    border-radius: 999px;
    transition: width 0.5s ease;
  }

  /* Table wrapper */
  .table-wrap {
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .table-toolbar {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar-title {
    font-weight: 600;
    font-size: 15px;
    color: var(--primary);
    flex: 1;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 14px;
    font-family: 'Sarabun', sans-serif;
    color: var(--text);
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--primary-light); }

  .filter-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  /* Table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
  }
  .data-table thead {
    background: var(--primary);
    color: white;
  }
  .data-table th {
    padding: 12px 14px;
    font-size: 12px;
    font-weight: 600;
    text-align: left;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .data-table th:first-child { width: 50px; text-align: center; }
  .data-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody tr:hover { background: var(--row-hover); }
  .data-table td {
    padding: 12px 14px;
    font-size: 13px;
    vertical-align: top;
  }
  .td-no { text-align: center; color: var(--text-light); font-size: 12px; }
  .place-name { font-weight: 600; font-size: 14px; color: var(--primary); }
  .place-addr { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .place-type { font-size: 11px; color: var(--tag-text); background: var(--tag-bg); padding: 2px 8px; border-radius: 999px; display: inline-block; margin-top: 3px; }

  /* Status badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .status-badge.active { background: #dcfce7; color: #15803d; }
  .status-badge.inactive { background: #fee2e2; color: #b91c1c; }
  .status-badge.empty { background: #fef9c3; color: #92400e; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  /* Form inputs inline */
  .inline-select {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    color: var(--text);
    outline: none;
    width: 100%;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .inline-select:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(26,111,160,0.12); }

  .inline-input {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Sarabun', sans-serif;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .inline-input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(26,111,160,0.12); }
  .inline-input::placeholder { color: #b0c4d0; }

  .coord-row { display: flex; gap: 6px; }
  .coord-row .inline-input { flex: 1; }
  .gps-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .gps-btn:hover { background: #00b396; transform: scale(1.05); }
  .gps-btn:active { transform: scale(0.97); }

  /* Save row button */
  .save-row-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; gap: 5px;
  }
  .save-row-btn:hover { background: var(--primary-light); }
  .save-row-btn:active { transform: scale(0.97); }
  .save-row-btn.saved { background: var(--success); }
  .save-row-btn.saving { background: var(--text-light); cursor: not-allowed; }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 2px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(10,74,110,0.10);
  }
  .bottom-info { font-size: 13px; color: var(--text-light); }
  .bottom-info strong { color: var(--primary); }
  .submit-all-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #00b396 100%);
    color: #003d2e;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 15px;
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(0,201,167,0.35);
    display: flex; align-items: center; gap: 8px;
  }
  .submit-all-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,201,167,0.4); }
  .submit-all-btn:active { transform: translateY(0); }
  .submit-all-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px; right: 24px;
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    box-shadow: 0 8px 24px rgba(10,74,110,0.3);
    transform: translateX(120%);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* Loading overlay */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9998;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { color: white; font-size: 15px; font-weight: 500; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* No amphoe screen */
  .no-amphoe {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    text-align: center;
    padding: 40px 20px;
  }
  .no-amphoe .big-icon { font-size: 72px; margin-bottom: 20px; }
  .no-amphoe h2 { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
  .no-amphoe p { color: var(--text-light); max-width: 420px; line-height: 1.7; }
  .no-amphoe code {
    display: inline-block;
    margin-top: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--primary);
    font-family: monospace;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .stats-bar { gap: 8px; }
    .stat-card { min-width: 100px; padding: 10px 14px; }
    .stat-val { font-size: 20px; }
    .data-table th, .data-table td { padding: 8px 8px; }
    .search-box { width: 140px; }
    .bottom-bar { flex-direction: column; align-items: stretch; gap: 8px; }

  renderAll();
};

function getRows() {
  return allData[currentAmphoe] || [];
}

function getFiltered() {
  let rows = getRows();
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    rows = rows.filter(r => r.place.toLowerCase().includes(s) || r.name.toLowerCase().includes(s) || r.addr.toLowerCase().includes(s));
  }
  if (filterStatus !== 'all') {
    rows = rows.filter((r,i) => {
      const d = formData[i] || {};
      if (filterStatus === 'filled') return d.status && d.status !== '';
      if (filterStatus === 'pending') return !d.status || d.status === '';
      return true;
    });
  }
  return rows;
}

function renderAll() {
  const rows = getRows();
  const filtered = getFiltered();
  const filled = rows.filter((r,i) => formData[i]?.status && formData[i].status !== '').length;

  const content = document.getElementById('mainContent');

  // Stats
  let statsHtml = `<div class="stats-bar">
    <div class="stat-card total"><div class="stat-label">สถานที่ทั้งหมด</div><div class="stat-val">${rows.length}</div></div>
    <div class="stat-card filled"><div class="stat-label">กรอกแล้ว</div><div class="stat-val">${filled}</div></div>
    <div class="stat-card pending"><div class="stat-label">ยังไม่กรอก</div><div class="stat-val">${rows.length - filled}</div></div>
  </div>`;

  // Progress
  const pct = rows.length > 0 ? Math.round(filled/rows.length*100) : 0;
  let progressHtml = `<div class="progress-wrap">
    <div class="progress-label"><span>ความคืบหน้า</span><span>${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;

  // Table
  let tableBody = '';
  if (filtered.length === 0) {
    tableBody = `<tr><td colspan="7"><div class="empty-state"><div class="icon">🔍</div><p>ไม่พบข้อมูลที่ค้นหา</p></div></td></tr>`;
  } else {
    filtered.forEach((row, fi) => {
      const i = getRows().indexOf(row);
      const d = formData[i] || {};
      const isSaved = savedRows.has(i);

      let statusBadge = `<span class="status-badge empty"><span class="status-dot"></span>ยังไม่กรอก</span>`;
      if (d.status === 'คงอยู่') statusBadge = `<span class="status-badge active"><span class="status-dot"></span>คงอยู่</span>`;
      else if (d.status === 'ไม่มีสภาพ') statusBadge = `<span class="status-badge inactive"><span class="status-dot"></span>ไม่มีสภาพ</span>`;
      else if (d.status && d.status !== '') statusBadge = `<span class="status-badge empty"><span class="status-dot"></span>${d.status}</span>`;

      tableBody += `<tr>
        <td class="td-no">${row.no}</td>
        <td>
          <div class="place-name">${row.place}</div>
          <div class="place-addr">${row.name}</div>
          <div class="place-addr">${row.addr}</div>
          <span class="place-type">${row.type}</span>
        </td>
        <td style="min-width:120px">
          <div style="margin-bottom:4px">${statusBadge}</div>
          <select class="inline-select" onchange="updateField(${i},'status',this.value)" style="margin-top:4px">
            <option value="">-- เลือกสถานะ --</option>
            <option value="คงอยู่" ${d.status==='คงอยู่'?'selected':''}>คงอยู่</option>
            <option value="ไม่มีสภาพ" ${d.status==='ไม่มีสภาพ'?'selected':''}>ไม่มีสภาพ</option>
            <option value="อื่นๆ" ${d.status==='อื่นๆ'?'selected':''}>อื่นๆ</option>
          </select>
        </td>
        <td style="min-width:200px">
          <div class="coord-row">
            <input class="inline-input" type="number" step="any" placeholder="Latitude" value="${d.lat||''}" onchange="updateField(${i},'lat',this.value)" />
            <input class="inline-input" type="number" step="any" placeholder="Longitude" value="${d.lng||''}" onchange="updateField(${i},'lng',this.value)" />
            <button class="gps-btn" onclick="getGPS(${i})" title="ใช้ตำแหน่งปัจจุบัน">📍</button>
          </div>
        </td>
        <td style="min-width:140px">
          <input class="inline-input" type="tel" placeholder="0xx-xxx-xxxx" value="${d.phone||''}" onchange="updateField(${i},'phone',this.value)" />
        </td>
        <td style="min-width:110px; text-align:center">
          <select class="inline-select" onchange="updateField(${i},'isTarget',this.value)">
            <option value="">-- เลือก --</option>
            <option value="ใช่" ${d.isTarget==='ใช่'?'selected':''}>✅ ใช่</option>
            <option value="ไม่ใช่" ${d.isTarget==='ไม่ใช่'?'selected':''}>❌ ไม่ใช่</option>
          </select>
        </td>
        <td>
          <button class="save-row-btn ${isSaved?'saved':''}" onclick="saveRow(${i},this)">
            ${isSaved ? '✓ บันทึกแล้ว' : '💾 บันทึก'}
          </button>
        </td>
      </tr>`;
    });
  }

  let tableHtml = `<div class="table-wrap">
    <div class="table-toolbar">
      <div class="toolbar-title">รายชื่อสถานที่ — อำเภอ${currentAmphoe}</div>
      <input class="search-box" type="text" placeholder="🔍 ค้นหาสถานที่..." value="${searchTerm}" oninput="searchTerm=this.value;renderAll()" />
      <select class="filter-select" onchange="filterStatus=this.value;renderAll()">
        <option value="all" ${filterStatus==='all'?'selected':''}>ทั้งหมด</option>
        <option value="filled" ${filterStatus==='filled'?'selected':''}>กรอกแล้ว</option>
        <option value="pending" ${filterStatus==='pending'?'selected':''}>ยังไม่กรอก</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>สถานที่</th>
            <th>สถานะ</th>
            <th>พิกัด GPS</th>
            <th>เบอร์โทรศัพท์</th>
            <th>กลุ่มเป้าหมาย</th>
            <th>บันทึก</th>
          </tr>
        </thead>
        <tbody>${tableBody}</tbody>
      </table>
    </div>
  </div>`;

  content.innerHTML = statsHtml + progressHtml + tableHtml;

  document.getElementById('filledCount').textContent = filled;
  document.getElementById('totalCount').textContent = rows.length;
}

function updateField(i, field, val) {
  if (!formData[i]) formData[i] = {};
  formData[i][field] = val;
  savedRows.delete(i);
  // Re-render stats only
  const rows = getRows();
  const filled = rows.filter((r,idx) => formData[idx]?.status && formData[idx].status !== '').length;
  const pct = rows.length > 0 ? Math.round(filled/rows.length*100) : 0;
  const pf = document.querySelector('.progress-fill');
  if (pf) pf.style.width = pct+'%';
  const pl = document.querySelector('.progress-label span:last-child');
  if (pl) pl.textContent = pct+'%';
  document.querySelectorAll('.stat-card.filled .stat-val').forEach(el => el.textContent = filled);
  document.querySelectorAll('.stat-card.pending .stat-val').forEach(el => el.textContent = rows.length - filled);
  document.getElementById('filledCount').textContent = filled;
}

function getGPS(i) {
  if (!navigator.geolocation) { showToast('เบราว์เซอร์ไม่รองรับ GPS', 'error'); return; }
  showToast('⏳ กำลังหาตำแหน่ง...');
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);
    updateField(i, 'lat', lat);
    updateField(i, 'lng', lng);
    // Update inputs
    const inputs = document.querySelectorAll(`[data-row="${i}"]`);
    renderAll();
    showToast('✅ ได้พิกัดแล้ว: '+lat+', '+lng, 'success');
  }, err => {
    showToast('❌ ไม่สามารถหาตำแหน่งได้', 'error');
  });
}

function saveRow(i, btn) {
  const d = formData[i] || {};
  if (!d.status) { showToast('⚠️ กรุณาเลือกสถานะก่อน', 'error'); return; }
  btn.classList.add('saving');
  btn.textContent = '⏳ กำลังบันทึก...';

  const row = getRows()[i];
  const payload = {
    action: 'saveRow',
    sheetName: SHEET_NAME,
    data: {
      timestamp: new Date().toLocaleString('th-TH'),
      amphoe: currentAmphoe,
      license: row.license,
      place: row.place,
      name: row.name,
      addr: row.addr,
      type: row.type,
      status: d.status || '',
      lat: d.lat || '',
      lng: d.lng || '',
      phone: d.phone || '',
      isTarget: d.isTarget || ''
    }
  };

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: {'Content-Type': 'text/plain'}
  })
  .then(r => r.json())
  .then(res => {
    if (res.status === 'ok') {
      savedRows.add(i);
      btn.classList.remove('saving');
      btn.classList.add('saved');
      btn.innerHTML = '✓ บันทึกแล้ว';
      showToast('✅ บันทึกสำเร็จ: '+row.place, 'success');
    } else {
      throw new Error(res.message || 'เกิดข้อผิดพลาด');
    }
  })
  .catch(err => {
    btn.classList.remove('saving');
    btn.innerHTML = '💾 บันทึก';
    showToast('❌ บันทึกไม่สำเร็จ: '+err.message, 'error');
  });
}

function submitAll() {
  const rows = getRows();
  const toSubmit = rows.filter((r,i) => formData[i]?.status && !savedRows.has(i));
  if (toSubmit.length === 0) {
    showToast('✅ ส่งข้อมูลทั้งหมดแล้ว', 'success');
    return;
  }
  document.getElementById('loadingOverlay').classList.add('show');

  const allPayload = toSubmit.map((row, fi) => {
    const i = rows.indexOf(row);
    const d = formData[i] || {};
    return {
      timestamp: new Date().toLocaleString('th-TH'),
      amphoe: currentAmphoe,
      license: row.license,
      place: row.place,
      name: row.name,
      addr: row.addr,
      type: row.type,
      status: d.status || '',
      lat: d.lat || '',
      lng: d.lng || '',
      phone: d.phone || '',
      isTarget: d.isTarget || ''
    };
  });

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({action: 'saveAll', sheetName: SHEET_NAME, data: allPayload}),
    headers: {'Content-Type': 'text/plain'}
  })
  .then(r => r.json())
  .then(res => {
    document.getElementById('loadingOverlay').classList.remove('show');
    if (res.status === 'ok') {
      toSubmit.forEach(r => savedRows.add(rows.indexOf(r)));
      renderAll();
      showToast('✅ ส่งข้อมูลสำเร็จ '+toSubmit.length+' รายการ', 'success');
    } else throw new Error(res.message);
  })
  .catch(err => {
    document.getElementById('loadingOverlay').classList.remove('show');
    showToast('❌ เกิดข้อผิดพลาด: '+err.message, 'error');
  });
}

function showNoAmphoe() {
  document.getElementById('amphoeBadge').textContent = 'ไม่ระบุอำเภอ';
  document.getElementById('mainContent').innerHTML = `
    <div class="no-amphoe">
      <div class="big-icon">🗺️</div>
      <h2>กรุณาระบุอำเภอใน URL</h2>
      <p>เพิ่ม <strong>?amphoe=ชื่ออำเภอ</strong> ต่อท้าย URL เพื่อเข้าสู่แบบฟอร์มของอำเภอนั้น</p>
      <code>form.html?amphoe=สิชล</code>
      <br><br>
      <p style="font-size:13px;color:var(--text-light)">อำเภอที่มีข้อมูล: ${Object.keys(allData).join(' · ')}</p>
    </div>`;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+(type||'');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
